name: Daily Website Uptime Check

on:
  schedule:
    - cron: "0 9 * * *"  # once per day at 09:00 UTC
  workflow_dispatch:

jobs:
  check-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check website
        id: check
        run: |
          if curl -fsS https://www.edenjia.com/broken > /dev/null; then
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
          fi

      - name: Send alert email
        if: steps.check.outputs.status == 'fail'
        run: |
          curl -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "alerts@edenjia.com",
              "to": "${{ secrets.PERSONAL_EMAIL }}",
              "subject": "🚨 edenjia.com is DOWN",
              "text": "Your site is not responding."
            }'